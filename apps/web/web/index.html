<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>her</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <span class="logo">her</span>
          <span class="brand-divider" aria-hidden="true"></span>
          <span class="tagline" id="session-title">새 대화</span>
        </div>
        <div class="topbar-actions">
          <button id="memory-btn" type="button" class="topbar-btn" title="기억 관리">
            <span class="icon" data-icon="brain" aria-hidden="true"></span>
            <span>기억</span>
          </button>
          <div class="status-pill">
            <span id="orb" class="orb idle" aria-hidden="true"></span>
            <span id="status-text" class="status-text">준비됨</span>
          </div>
        </div>
      </header>

      <aside class="rail" id="left-rail" aria-label="왼쪽 위젯">
        <div class="widget-stack"></div>
      </aside>

      <main class="chat-panel" aria-label="채팅">
        <div id="messages" class="messages" role="log" aria-live="polite">
          <div id="welcome" class="welcome">
            <div class="welcome-mark">her</div>
            <p class="welcome-greeting">무엇을 도와드릴까요?</p>
            <p class="welcome-hint">기억과 일정을 기반으로 가족처럼 챙겨드려요.</p>
            <div class="suggest-grid" role="group" aria-label="추천 질문">
              <button type="button" class="suggest-chip" data-prompt="어머니 생신 선물 추천해줘">
                어머니 생신 선물 추천
              </button>
              <button type="button" class="suggest-chip" data-prompt="오늘 저녁 메뉴 정해줘">
                오늘 저녁 메뉴 정해줘
              </button>
              <button type="button" class="suggest-chip" data-prompt="이번 주 일정 정리해줘">
                이번 주 일정 정리
              </button>
              <button type="button" class="suggest-chip" data-prompt="최근 기억해둔 메모 보여줘">
                최근 메모 보여줘
              </button>
            </div>
          </div>
        </div>
        <form id="composer" class="composer" autocomplete="off">
          <div class="input-wrap">
            <textarea
              id="input"
              class="input"
              placeholder="무엇이든 물어보세요. Enter 전송, Shift+Enter 줄바꿈."
              rows="1"
              aria-label="메시지 입력"
            ></textarea>
            <button type="submit" id="send" class="send-btn" aria-label="전송">
              <span class="icon" data-icon="send" aria-hidden="true"></span>
            </button>
          </div>
        </form>
      </main>

      <aside class="rail" id="right-rail" aria-label="오른쪽 위젯">
        <div class="widget-stack"></div>
      </aside>
    </div>

    <script type="module" src="/static/icons.js"></script>
    <script type="module" src="/static/topbar.js"></script>
    <script type="module" src="/static/chat.js"></script>
    <script type="module" src="/static/widgets/main.js"></script>
    <script type="module" src="/static/memory-modal.js"></script>
  </body>
</html>
