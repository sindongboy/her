<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>her</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <span class="logo">her</span>
          <span class="brand-divider" aria-hidden="true"></span>
          <span class="tagline" id="session-title">새 대화</span>
        </div>
        <div class="status-pill">
          <span id="orb" class="orb idle" aria-hidden="true"></span>
          <span id="status-text" class="status-text">준비됨</span>
        </div>
      </header>

      <aside class="left-panel" aria-label="대화 세션 목록">
        <div class="panel-head">
          <h2 data-icon="message">대화</h2>
          <button id="new-session" class="ghost-btn" type="button" data-icon="plus">
            새 대화
          </button>
        </div>
        <ul id="session-list" class="session-list" role="list"></ul>
      </aside>

      <main class="chat-panel" aria-label="채팅">
        <div id="messages" class="messages" role="log" aria-live="polite">
          <div id="welcome" class="welcome">
            <div class="welcome-mark">her</div>
            <p class="welcome-greeting">무엇을 도와드릴까요?</p>
            <p class="welcome-hint">기억과 일정을 기반으로 가족처럼 챙겨드려요.</p>
            <div class="suggest-grid" role="group" aria-label="추천 질문">
              <button type="button" class="suggest-chip" data-prompt="어머니 생신 선물 추천해줘">
                어머니 생신 선물 추천
              </button>
              <button type="button" class="suggest-chip" data-prompt="오늘 저녁 메뉴 정해줘">
                오늘 저녁 메뉴 정해줘
              </button>
              <button type="button" class="suggest-chip" data-prompt="이번 주 일정 정리해줘">
                이번 주 일정 정리
              </button>
              <button type="button" class="suggest-chip" data-prompt="최근 기억해둔 메모 보여줘">
                최근 메모 보여줘
              </button>
            </div>
          </div>
        </div>
        <form id="composer" class="composer" autocomplete="off">
          <div class="input-wrap">
            <textarea
              id="input"
              class="input"
              placeholder="무엇이든 물어보세요. Enter 전송, Shift+Enter 줄바꿈."
              rows="1"
              aria-label="메시지 입력"
            ></textarea>
            <button type="submit" id="send" class="send-btn" aria-label="전송">
              <span class="icon" data-icon="send" aria-hidden="true"></span>
            </button>
          </div>
        </form>
      </main>

      <aside class="right-panel" aria-label="메모리 프로브">
        <div class="panel-head">
          <h2 data-icon="brain">메모리 프로브</h2>
        </div>

        <section class="probe-section" data-section="recall">
          <div class="section-head">
            <span class="section-label" data-icon="sparkles">이번 답변에 떠올린 기억</span>
          </div>
          <div id="probe-recall" class="probe-recall">
            <p class="empty">질문을 보내면 채워집니다</p>
          </div>
        </section>

        <section class="probe-section" data-section="notes">
          <div class="section-head">
            <span class="section-label" data-icon="note">메모</span>
          </div>
          <ul id="recent-notes" class="probe-list"></ul>
        </section>

        <section class="probe-section" data-section="people">
          <div class="section-head">
            <span class="section-label" data-icon="user">사람</span>
          </div>
          <ul id="recent-people" class="probe-list"></ul>
        </section>
      </aside>
    </div>

    <script type="module" src="/static/icons.js"></script>
    <script type="module" src="/static/sessions.js"></script>
    <script type="module" src="/static/chat.js"></script>
    <script type="module" src="/static/memory.js"></script>
  </body>
</html>
